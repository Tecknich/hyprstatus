[repository]
name = "hyprstatus"
authors = ["Tecknich"]
# NOTE: no commit_pins. A pin makes `hyprpm add`/`update` reset to the pinned
# commit and build THAT, which freezes an actively-developed repo at an old tree
# (and silently drops everything merged since). Tracking repo HEAD keeps every
# `hyprpm update` on the latest main. Re-introduce commit_pins only for a real
# multi-Hyprland-version distribution, pointing each entry at a tagged/stable
# commit and bumping it per release.

[hyprstatus]
description = "Compositor-rendered status bar for Hyprland — a Waybar replacement that lives inside the compositor"
authors = ["Tecknich"]
output = "build/hyprstatus.so"
build = [
    "cmake --no-warn-unused-cli -DCMAKE_BUILD_TYPE=Release -B build -S .",
    "cmake --build build --parallel",
]
