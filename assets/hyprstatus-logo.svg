<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="hyprstatus">
  <defs>
    <linearGradient id="hs-badge" x1="64" y1="4" x2="64" y2="124" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f1a2e"/>
      <stop offset="1" stop-color="#060a14"/>
    </linearGradient>
    <linearGradient id="hs-accent" x1="20" y1="0" x2="108" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4df3ff"/>
      <stop offset="1" stop-color="#0066ff"/>
    </linearGradient>
    <linearGradient id="hs-bar" x1="64" y1="20" x2="64" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#182842"/>
      <stop offset="1" stop-color="#0e1a30"/>
    </linearGradient>
    <radialGradient id="hs-glow" cx="0.5" cy="0.28" r="0.75">
      <stop offset="0" stop-color="#00e5ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- badge -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#hs-badge)"/>
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#hs-glow)"/>
  <rect x="4.75" y="4.75" width="118.5" height="118.5" rx="27.25" stroke="#00e5ff" stroke-opacity="0.30" stroke-width="1.5"/>

  <!-- floating status bar -->
  <rect x="20" y="20" width="88" height="21" rx="8.5" fill="url(#hs-bar)" stroke="#2f4a72" stroke-opacity="0.6"/>
  <!-- workspaces: active pill + two dots -->
  <rect x="28" y="27.5" width="12" height="6" rx="3" fill="url(#hs-accent)"/>
  <circle cx="47" cy="30.5" r="2.6" fill="#45597f"/>
  <circle cx="56" cy="30.5" r="2.6" fill="#45597f"/>
  <!-- right side: clock pill + one module tick -->
  <rect x="76" y="27" width="24" height="7.5" rx="3.75" fill="#80ffff" fill-opacity="0.92"/>
  <rect x="68" y="28" width="4" height="5.5" rx="1.4" fill="#45597f"/>

  <!-- desktop area with a faint tiled window pair -->
  <rect x="20" y="51" width="42" height="53" rx="9" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.07"/>
  <rect x="66" y="51" width="42" height="53" rx="9" fill="#00e5ff" fill-opacity="0.08" stroke="#00e5ff" stroke-opacity="0.18"/>
  <!-- accent title bar on the focused window -->
  <rect x="66" y="51" width="42" height="8" rx="9" fill="url(#hs-accent)" fill-opacity="0.55"/>
  <rect x="66" y="55" width="42" height="4" fill="#00e5ff" fill-opacity="0.30"/>
</svg>
