<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="hyprstatus">
  <defs>
    <linearGradient id="hs-badge" x1="64" y1="4" x2="64" y2="124" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#141133"/>
      <stop offset="1" stop-color="#08061c"/>
    </linearGradient>
    <linearGradient id="hs-accent" x1="20" y1="0" x2="108" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff6ec7"/>
      <stop offset="1" stop-color="#c47cf0"/>
    </linearGradient>
    <linearGradient id="hs-bar" x1="64" y1="20" x2="64" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#282155"/>
      <stop offset="1" stop-color="#1b1743"/>
    </linearGradient>
    <radialGradient id="hs-glow" cx="0.5" cy="0.28" r="0.75">
      <stop offset="0" stop-color="#ff6ec7" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ff6ec7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- badge -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#hs-badge)"/>
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#hs-glow)"/>
  <rect x="4.75" y="4.75" width="118.5" height="118.5" rx="27.25" stroke="#ff6ec7" stroke-opacity="0.28" stroke-width="1.5"/>

  <!-- floating status bar -->
  <rect x="20" y="20" width="88" height="21" rx="8.5" fill="url(#hs-bar)" stroke="#4a3f80" stroke-opacity="0.55"/>
  <!-- workspaces: active pill + two dots -->
  <rect x="28" y="27.5" width="12" height="6" rx="3" fill="url(#hs-accent)"/>
  <circle cx="47" cy="30.5" r="2.6" fill="#7d72b8"/>
  <circle cx="56" cy="30.5" r="2.6" fill="#7d72b8"/>
  <!-- right side: clock pill + two module ticks -->
  <rect x="76" y="27" width="24" height="7.5" rx="3.75" fill="#ff6ec7" fill-opacity="0.9"/>
  <rect x="68" y="28" width="4" height="5.5" rx="1.4" fill="#7d72b8"/>

  <!-- desktop area with a faint tiled window pair -->
  <rect x="20" y="51" width="42" height="53" rx="9" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.07"/>
  <rect x="66" y="51" width="42" height="53" rx="9" fill="#ff6ec7" fill-opacity="0.07" stroke="#ff6ec7" stroke-opacity="0.16"/>
  <!-- accent bar on the focused window -->
  <rect x="66" y="51" width="42" height="8" rx="9" fill="url(#hs-accent)" fill-opacity="0.5"/>
  <rect x="66" y="55" width="42" height="4" fill="#ff6ec7" fill-opacity="0.28"/>
</svg>
