# hyprstatus - example configuration
#
# A full, self-contained bar: floating + themed, native modules, two
# Waybar-compatible script modules, notifications, and a tray. Source it from
# hyprland.conf:
#     source = ~/.config/hypr/hyprstatus.conf
#
# Per-module options use Waybar's names (format, format-icons.<key>, states.*,
# interval, on-click*, tooltip-format*, ...). Only the first two commas on a
# `hyprstatus-set` line split module/key/value, so commas inside a value are fine.
# Colours are named slots (see the palette below) so one edit restyles everything.
#
# Recommended companion: pyprland (https://github.com/hyprland-community/pyprland).
# The `pypr toggle <name>` click actions below are scratchpad dropdowns defined in
# example/pyprland.toml; each has a plain-app alternative noted for pypr-less setups.

plugin {
    hyprstatus {
        enabled = true
        position = top
        height = 38
        margin = 4          # float the bar with the same gap as tiled windows
        spacing = 4
        rounding = 6
        border_size = 1
        blur = false
        hide_on_fullscreen = true   # hide the bar while a window is fullscreen
        font_family = JetBrainsMono Nerd Font
        font_size = 13

        modules_left   = identity workspaces
        modules_center = nowplaying
        modules_right  = tray updates cpu memory network pulseaudio power-profiles battery notifications clock

        # ---- palette (named slots; every module resolves its colours here) ----
        col.background        = rgba(06051aa6)   # bar background (translucent)
        col.foreground        = rgba(8b80b0ff)   # normal text
        col.foreground_bright = rgba(e8e3ffff)   # emphasised text (bold identity, ...)
        col.border            = rgba(2a2150ff)
        col.accent            = rgba(ff6ec7ff)   # active workspace, clock, highlights
        col.accent_dim        = rgba(8f3f74ff)
        col.ok                = rgba(9ece6aff)   # charging / healthy states
        col.warn              = rgba(e0af68ff)   # warning states
        col.err               = rgba(f7768eff)   # critical states
        col.tooltip_bg        = rgba(151129f0)
        col.tooltip_fg        = rgba(cdc7e8ff)
    }
}

# ---- static text module -------------------------------------------------
hyprstatus-module = identity
hyprstatus-set = identity, format, hyprstatus
hyprstatus-set = identity, tooltip, false
hyprstatus-set = identity, color, accent
hyprstatus-set = identity, padding, 14
hyprstatus-set = identity, bold, true

# ---- native modules -----------------------------------------------------
hyprstatus-set = workspaces, persistent, 1 2 3 4 5
hyprstatus-set = workspaces, padding, 10

hyprstatus-set = clock, format, %a, %b %d   %I:%M %p
hyprstatus-set = clock, interval, 1
hyprstatus-set = clock, color, accent
hyprstatus-set = clock, padding, 12
# pill background + border (a "clock pill" like Waybar), matching the theme
hyprstatus-set = clock, background, rgba(ff6ec71a)
hyprstatus-set = clock, box-border, rgba(8f3f74ff)
hyprstatus-set = clock, box-rounding, 6
# hover shows a month calendar; right-click the clock to toggle a full-year view

hyprstatus-set = cpu, format, CPU {usage:>2}%
hyprstatus-set = cpu, interval, 2
hyprstatus-set = memory, format, MEM {percentage:>2}%
hyprstatus-set = memory, interval, 2

hyprstatus-set = network, format-wifi,  {essid} {signalStrength}%
hyprstatus-set = network, format-ethernet,  {ifname}
hyprstatus-set = network, format-disconnected, NET x
hyprstatus-set = network, interval, 2
hyprstatus-set = network, tooltip-format-wifi, {ifname} - {essid}\nIP: {ipaddr}/{cidr}\nStrength: {signalStrength}%\nDown {bandwidthDownBits}  Up {bandwidthUpBits}
# dropdown via a pyprland scratchpad (see example/pyprland.toml);
# without pyprland use e.g.:  nm-connection-editor
hyprstatus-set = network, on-click, pypr toggle nmtui

hyprstatus-set = pulseaudio, format, {icon} {volume}%
hyprstatus-set = pulseaudio, format-bluetooth, {volume}%
hyprstatus-set = pulseaudio, format-muted,  muted
hyprstatus-set = pulseaudio, format-icons.speaker, 
hyprstatus-set = pulseaudio, format-icons.headphone, 
hyprstatus-set = pulseaudio, format-icons.hdmi, 
hyprstatus-set = pulseaudio, format-icons.default, 
hyprstatus-set = pulseaudio, scroll-step, 5
hyprstatus-set = pulseaudio, max-volume, 153
# dropdown mixer via a pyprland scratchpad; without pyprland:  pavucontrol
hyprstatus-set = pulseaudio, on-click, pypr toggle audio

hyprstatus-set = power-profiles, format, {icon}
hyprstatus-set = power-profiles, format-icons.power-saver, ECO
hyprstatus-set = power-profiles, format-icons.balanced, BAL
hyprstatus-set = power-profiles, format-icons.performance, PERF
hyprstatus-set = power-profiles, format-icons.default, PWR

hyprstatus-set = battery, interval, 30
hyprstatus-set = battery, states.warning, 20
hyprstatus-set = battery, states.critical, 10
hyprstatus-set = battery, format, {icon} {capacity}%
hyprstatus-set = battery, format-charging,  {capacity}%
hyprstatus-set = battery, format-plugged,  {capacity}%
hyprstatus-set = battery, format-icons,     
hyprstatus-set = battery, tooltip-format, {timeTo}  ({power}W)\nHealth: {health}%

# notifications: built-in SwayNotificationCenter module. Bell + unread count;
# left-click opens the panel, right-click toggles do-not-disturb.
hyprstatus-set = notifications, format, {icon} {text}
hyprstatus-set = notifications, format-icons.notification,  ●
hyprstatus-set = notifications, format-icons.none,
hyprstatus-set = notifications, format-icons.dnd-notification,  ●
hyprstatus-set = notifications, format-icons.dnd-none,
hyprstatus-set = notifications, on-click, swaync-client -t -sw
hyprstatus-set = notifications, on-click-right, swaync-client -d -sw
hyprstatus-set = notifications, color.notification, accent

# ---- custom exec modules (Waybar-compatible) -----------------------------
# now-playing: current track via playerctl (plain text, polled). A json script
# can return {text,alt,tooltip,class,percentage} instead - see the README.
hyprstatus-module = nowplaying
hyprstatus-set = nowplaying, exec, playerctl metadata --format '{{artist}} - {{title}}' 2>/dev/null
hyprstatus-set = nowplaying, exec-if, command -v playerctl
hyprstatus-set = nowplaying, interval, 2
hyprstatus-set = nowplaying, max-length, 60
hyprstatus-set = nowplaying, hide-when-empty, true
hyprstatus-set = nowplaying, on-click, playerctl play-pause
hyprstatus-set = nowplaying, on-click-right, playerctl next
hyprstatus-set = nowplaying, on-scroll-up, playerctl volume 0.05+
hyprstatus-set = nowplaying, on-scroll-down, playerctl volume 0.05-
hyprstatus-set = nowplaying, padding, 14

# pending updates count (pacman-contrib's checkupdates; swap for your distro).
hyprstatus-module = updates
hyprstatus-set = updates, exec, echo "$(checkupdates 2>/dev/null | wc -l) upd"
hyprstatus-set = updates, exec-if, command -v checkupdates
hyprstatus-set = updates, interval, 600
hyprstatus-set = updates, on-click, kitty -e sh -c 'checkupdates; read x'

# ---- tray (StatusNotifierItem host) --------------------------------------
# hide         : space/comma tokens; hide an item whose Id/Title contains one
# hide-passive : hide Passive items entirely instead of dimming them
# hide-if-bt-disconnected : ";"-separated "<item>=<device>" rules - hide the
#   matched item unless a BlueZ device whose Alias/Name/Address contains
#   <device> is Connected right now (watched live over the system bus). Use it
#   for apps that keep their tray item registered after their bluetooth device
#   drops - e.g. librepods leaves its AirPods item (with stale battery) behind:
hyprstatus-set = tray, hide-if-bt-disconnected, librepods=AirPods

# refresh a module from a keybind or script:
#   hyprctl dispatch hyprstatus:refresh updates
# toggle the whole bar:
#   bind = $mainMod, B, hyprstatus:toggle
