name: build

# Builds hyprstatus against the Hyprland headers shipped by Arch (the same
# headers hyprpm builds against on an end-user machine). A failure here is the
# signal that Hyprland's internal API drifted and the plugin needs an update
# + a new commit_pin. Runs on push, PRs, and weekly to catch upstream drift.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install toolchain + Hyprland headers + deps
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel cmake git pkgconf gcc \
            hyprland \
            pango cairo librsvg libpulse systemd-libs \
            pixman libdrm wayland libxkbcommon

      - uses: actions/checkout@v4

      - name: Report versions
        run: |
          Hyprland --version || true
          pkg-config --modversion hyprland || true
          gcc --version | head -1

      - name: Configure
        run: cmake --no-warn-unused-cli -DCMAKE_BUILD_TYPE=Release -B build -S .

      - name: Debug compiler + flags
        run: |
          echo "CMAKE_CXX_COMPILER_ID = $(cmake -LA -N build 2>/dev/null | grep -i COMPILER_ID || echo '(not cached)')"
          echo "--- flags.make (CXX_FLAGS) ---"
          grep -H 'CXX_FLAGS' build/CMakeFiles/hyprstatus.dir/flags.make || true
          grep -q 'gnu-unique' build/CMakeFiles/hyprstatus.dir/flags.make \
            && echo ">>> -fno-gnu-unique IS present" \
            || echo ">>> -fno-gnu-unique is MISSING"

      - name: Build
        run: cmake --build build --parallel

      - name: Verify plugin artifact + ABI hygiene
        run: |
          so=build/hyprstatus.so
          test -f "$so" || { echo "FAIL: $so not built"; exit 1; }
          fail=0
          # required exported plugin entry points
          for sym in pluginInit pluginAPIVersion pluginExit; do
            if nm -D "$so" | grep -q " T $sym"; then
              echo "OK:   export $sym"
            else
              echo "FAIL: missing export $sym"; fail=1
            fi
          done
          # STB_GNU_UNIQUE symbols break dlclose/plugin unload — there must be none
          uc=$(nm "$so" | grep -c ' u ' || true)
          if [ "$uc" = "0" ]; then
            echo "OK:   0 STB_GNU_UNIQUE symbols"
          else
            echo "FAIL: $uc STB_GNU_UNIQUE symbol(s):"
            nm "$so" | grep ' u ' | c++filt
            fail=1
          fi
          [ "$fail" = "0" ] && echo "hyprstatus.so OK" || exit 1
