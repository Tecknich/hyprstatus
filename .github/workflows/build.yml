name: build

# Builds hyprstatus against the Hyprland headers shipped by Arch (the same
# headers hyprpm builds against on an end-user machine). A failure here is the
# signal that Hyprland's internal API drifted and the plugin needs an update
# + a new commit_pin. Runs on push, PRs, and weekly to catch upstream drift.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install toolchain + Hyprland headers + deps
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel cmake git pkgconf gcc \
            hyprland \
            pango cairo librsvg libpulse systemd-libs \
            pixman libdrm wayland libxkbcommon

      - uses: actions/checkout@v4

      - name: Report versions
        run: |
          Hyprland --version || true
          pkg-config --modversion hyprland || true
          gcc --version | head -1

      - name: Configure
        run: cmake --no-warn-unused-cli -DCMAKE_BUILD_TYPE=Release -B build -S .

      - name: Build
        run: cmake --build build --parallel

      - name: Verify plugin artifact + ABI hygiene
        run: |
          so=build/hyprstatus.so
          test -f "$so" || { echo "FAIL: $so not built"; exit 1; }
          fail=0
          # required exported plugin entry points
          for sym in pluginInit pluginAPIVersion pluginExit; do
            if nm -D "$so" | grep -q " T $sym"; then
              echo "OK:   export $sym"
            else
              echo "FAIL: missing export $sym"; fail=1
            fi
          done
          # STB_GNU_UNIQUE symbols block dlclose()/plugin unload. -fno-gnu-unique
          # keeps hyprstatus's OWN code free of them; the only ones that can remain
          # are libstdc++ locale-facet guard variables (std::...::id), which are
          # unique only when the *system* libstdc++ was itself built with
          # --enable-gnu-unique-object — a prebuilt-library property we cannot strip
          # and which end users' own hyprpm builds resolve against a shared
          # libstdc++ anyway. So flag only unique symbols originating in our code.
          total_unique=$(nm "$so" | grep -c ' u ' || true)
          own_unique=$(nm "$so" | grep ' u ' | c++filt \
            | grep -vE ' (std|__gnu_cxx|__cxxabiv1)::' | grep -c . || true)
          if [ "$own_unique" = "0" ]; then
            echo "OK:   0 hyprstatus-owned STB_GNU_UNIQUE symbols ($total_unique libstdc++ locale symbol(s) ignored)"
          else
            echo "FAIL: $own_unique hyprstatus-owned STB_GNU_UNIQUE symbol(s):"
            nm "$so" | grep ' u ' | c++filt | grep -vE ' (std|__gnu_cxx|__cxxabiv1)::'
            fail=1
          fi
          # NODELETE guard (issue #12): the plugin must not reference anything
          # libstdc++ defines as STB_GNU_UNIQUE (locale facets pulled in by
          # <fstream>/<sstream>). On unique-emitting toolchains those guards
          # land in (or bind from) the plugin and the loader pins the DSO,
          # silently breaking dlclose()/`hyprctl plugin unload`.
          libcxx=$(g++ -print-file-name=libstdc++.so.6)
          nm -D --defined-only "$libcxx" | awk '$2=="u"{print $3}' | sort -u > /tmp/libcxx-unique.txt
          bad=$(nm -u "$so" | awk '{print $NF}' | sort -u | comm -12 - /tmp/libcxx-unique.txt | wc -l)
          if [ "$bad" = "0" ]; then
            echo "OK:   no refs into libstdc++'s STB_GNU_UNIQUE set ($(wc -l < /tmp/libcxx-unique.txt) symbols checked)"
          else
            echo "FAIL: $bad undefined ref(s) into libstdc++'s STB_GNU_UNIQUE set (reintroduced <fstream>/<sstream>?):"
            nm -u "$so" | awk '{print $NF}' | sort -u | comm -12 - /tmp/libcxx-unique.txt | c++filt
            fail=1
          fi
          [ "$fail" = "0" ] && echo "hyprstatus.so OK" || exit 1
